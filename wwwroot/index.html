<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie Filskane</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="content">
        <div class="container1">
            <div class="background">

            </div>
        </div>
        <div class="container2">
            <div class="logo">
                <h1>Filskane</h1>
                <p>Tu kiedyś będzie logo.</p>
            </div>

            <div class="login_area">
                <h2>Logowanie</h2>
                <form>
                    <input type="text" placeholder="Nazwa użytkownika" required>
                    <input type="password" placeholder="Hasło" required>
                    <button class="log-in" type="submit">Zaloguj się</button>
                </form>

                <div id="errorMessage" style="color: red; display: none;">Nieprawidłowy login lub hasło!</div>

                <button class="forgot-password" type="button">Zapomniałeś hasła?</button>

                <button class="register" type="button" onclick="window.location.href='register.html'">Zarejestruj się</button>
            </div>

        </div>
    </div>


    <footer>
        <p>&copy; 2024 Moja Strona. Wszelkie prawa zastrzeżone.</p>
    </footer>

    <script src="/js/login.js"></script>
</body>
</html>
