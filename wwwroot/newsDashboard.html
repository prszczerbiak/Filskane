<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twój Filskane</title>
    <link rel="stylesheet" href="css/newsDashboardStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
 
</head>
<body>
    <div class="content">
        <div class="weather-header">
            <h3>Prognoza na 24h</h3>
        </div>
        <div id="weather-widget">
            <div id="weather-hours"></div>
        </div>
        <div class="see-more-container">
            <button class="btn-see-more">Zobacz więcej</button>
        </div>

        <!-- Główna sekcja informacyjna -->
        <div class="info-section">
            <!-- Lewa kolumna: aktualności -->
            <div class="news-section">
                <h4>Aktualności rolnicze</h4>
                <p>Tu pojawią się aktualności rolnicze...</p>
            </div>

            <!-- Prawa kolumna: kalendarz + ceny -->
            <div class="right-section">
                <!-- Lewa część prawej kolumny: kalendarz -->
                <div class="calendar-section">
                    <h4>Kalendarz</h4>
                    <p>Tu pojawi się kalendarz...</p>
                </div>
                <!-- Prawa część prawej kolumny: ceny płodów -->
                <div class="prices-section">
                    <h4>Ceny płodów</h4>
                    <p>Tu pojawią się ceny płodów w skupach...</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Filskane. Wszelkie prawa zastrzeżone.</p>
    </footer>

    <script src="js/newsDashboard.js"></script>
</body>
</html>
