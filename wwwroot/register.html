<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja - System Filskane</title>

    <link rel="stylesheet" href="css/registerStyle.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="content">
        <div class="register_area">
            <h2>Rejestracja</h2>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <input type="text" id="name" placeholder="Imię*" autocomplete="given-name">
                    <div id="errorName" class="errorForm">Pole wymagane</div>
                </div>

                <div class="form-group">
                    <input type="text" id="username" placeholder="Nazwa użytkownika*" autocomplete="username">
                    <div id="errorUsername" class="errorForm">Pole wymagane</div>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email*" autocomplete="email">
                    <div id="emailMessage" class="validation-message"></div>
                    <div id="errorEmail" class="errorForm">Pole wymagane</div>
                </div>

                <div class="form-group">
                    <input type="tel" id="phone" placeholder="Telefon" autocomplete="tel">
                </div>

                <div class="form-group">
                    <input type="password" id="password" placeholder="Hasło*" autocomplete="new-password">
                    <div id="errorPassword" class="errorForm">Pole wymagane</div>
                    <div id="passwordInfo" class="info-text">
                        Conajmniej 7 znaków, wielka i mała litera, cyfra oraz znak specjalny.
                    </div>
                </div>

                <div class="form-group">
                    <input type="password" id="againPassword" placeholder="Powtórz hasło" autocomplete="new-password">
                    <div id="errorAgainPassword" class="errorForm">Hasła nie są takie same</div>
                    <div id="successAgainPassword" class="successForm" style="display:none;">Hasła są takie same ✅</div>
                </div>

                <div class="terms">
                    <input type="checkbox" id="acceptTerms">
                    <label for="acceptTerms">
                        Zapoznałem/am się* z
                        <a href="/regulamin" target="_blank">regulaminem</a>
                    </label>
                </div>
                <div id="errorTerms" class="errorForm">Musisz zaakceptować regulamin</div>

                <button class="register" type="submit">Zarejestruj się</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Filskane. Wszelkie prawa zastrzeżone.</p>
    </footer>

    <script src="js/register.js"></script>
</body>
</html>
