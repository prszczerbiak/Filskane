<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie Filskane</title>
    <link rel="stylesheet" href="css/registerStyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="content">
        <div class="register_area">
            <h2>Rejestracja</h2>
            <form id="registerForm" novalidate>
                <input type="text" id="name" placeholder="Imię*">
                <div id="errorName" class="errorForm">Pole wymagane</div>

                <input type="text" id="username" placeholder="Nazwa użytkownika*">
                <div id="errorUsername" class="errorForm">Pole wymagane</div>

                <input type="text" id="email" placeholder="Email*" onblur="checkEmail()">
                <div id="emailMessage" style="font-size: 14px; margin-top: 5px;"></div>
                <div id="errorEmail" class="errorForm">Pole wymagane</div>

                <input type="text" placeholder="Telefon">

                <input type="password" id="password" placeholder="Hasło*">
                <div id="errorPassword" class="errorForm">Pole wymagane</div>
                <div id="passwordInfo">Conajmniej 7 znaków, wielka i mała litery, cyfra oraz znak specjalny</div>

                <input type="password" id="againPassword" placeholder="Powtórz hasło">
                <div id="errorAgainPassword" class="errorForm">Hasła nie są takie same</div>
                <div id="successAgainPassword" class="successForm" style="display:none;">Hasła są takie same ✅</div>

                <div class="terms">
                    <input type="checkbox" id="acceptTerms">
                    <label for="acceptTerms">
                        Zapoznałem/am się* z
                        <a href="/regulamin" target="_blank">regulaminem</a>
                    </label>
                </div>
                <div id="errorTerms" class="errorForm">Musisz zaakceptować regulamin</div>

                <button class="register" type="submit">Zarejestruj się</button>
            </form>

        </div>

    </div>


    <footer>
        <p>&copy; 2024 Moja Strona. Wszelkie prawa zastrzeżone.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("registerForm");
            const fields = {
                name: document.getElementById("name"),
                username: document.getElementById("username"),
                email: document.getElementById("email"),
                password: document.getElementById("password"),
                againPassword: document.getElementById("againPassword"),
                terms: document.getElementById("acceptTerms")
            };

            const errors = {
                name: document.getElementById("errorName"),
                username: document.getElementById("errorUsername"),
                email: document.getElementById("errorEmail"),
                password: document.getElementById("errorPassword"),
                againPassword: document.getElementById("errorAgainPassword"),
                successPassword: document.getElementById("successAgainPassword"),
                terms: document.getElementById("errorTerms"),
                emailMessage: document.getElementById("emailMessage"),
                passwordInfo: document.getElementById("passwordInfo")
            };

            // 🧩 WALIDACJE FRONTENDOWE

            // Sprawdzanie pojedynczego pola
            function checkField(field, errorEl) {
                if (!field.value.trim()) {
                    errorEl.style.display = "block";
                    return false;
                }
                errorEl.style.display = "none";
                return true;
            }

            // Walidacja hasła
            function isValidPassword(password) {
                return (
                    password.length >= 7 &&
                    /[A-Z]/.test(password) &&
                    /[a-z]/.test(password) &&
                    /\d/.test(password) &&
                    /[!@#$%^&*(),.?":{}|<>_\-+=/\\[\]]/.test(password)
                );
            }

            // Sprawdzanie poprawności powtórzenia hasła
            function checkPasswordsMatch() {
                const pass = fields.password.value;
                const again = fields.againPassword.value;

                if (!again) {
                    errors.againPassword.style.display = "none";
                    errors.successPassword.style.display = "none";
                    return;
                }

                if (pass === again) {
                    errors.againPassword.style.display = "none";
                    errors.successPassword.style.display = "block";
                } else {
                    errors.againPassword.style.display = "block";
                    errors.successPassword.style.display = "none";
                }
            }

            // Sprawdzanie emaila po wpisaniu
            window.checkEmail = async function() {
                const email = fields.email.value.trim();
                const msg = errors.emailMessage;
                const pattern = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;

                if (!email) {
                    msg.textContent = "";
                    return;
                }

                if (!pattern.test(email)) {
                    msg.textContent = "Nieprawidłowy format adresu e-mail ❌";
                    msg.style.color = "red";
                    return;
                }

                try {
                    const res = await fetch("/api/auth/check-email", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email })
                    });

                    const data = await res.json();
                    if (data.exists) {
                        msg.textContent = "Email jest już zajęty ❌";
                        msg.style.color = "red";
                    } else {
                        msg.textContent = "Email jest dostępny ✅";
                        msg.style.color = "green";
                    }
                } catch {
                    msg.textContent = "Błąd połączenia z serwerem ❌";
                    msg.style.color = "red";
                }
            }

            // 🧠 Walidacja pełnego formularza
            function validateForm() {
                let valid = true;

                valid &= checkField(fields.name, errors.name);
                valid &= checkField(fields.username, errors.username);
                valid &= checkField(fields.email, errors.email);
                valid &= checkField(fields.password, errors.password);

                if (!isValidPassword(fields.password.value)) {
                    errors.passwordInfo.classList.add("invalid");
                    valid = false;
                } else {
                    errors.passwordInfo.classList.remove("invalid");
                }

                if (fields.password.value !== fields.againPassword.value) {
                    errors.againPassword.style.display = "block";
                    valid = false;
                } else {
                    errors.againPassword.style.display = "none";
                }

                if (!fields.terms.checked) {
                    errors.terms.style.display = "block";
                    valid = false;
                } else {
                    errors.terms.style.display = "none";
                }

                return !!valid;
            }

            // 🧩 REJESTRACJA (wysyłka danych)
            async function registerUser() {
                const payload = {
                    name: fields.name.value.trim(),
                    username: fields.username.value.trim(),
                    email: fields.email.value.trim(),
                    password: fields.password.value.trim()
                };

                try {
                    const response = await fetch("/api/auth/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        window.location.href = "verifyRegistration.html";
                    } else {
                        const data = await response.json();
                        alert("❌ Błąd: " + (data.message || "Nie udało się zarejestrować użytkownika."));
                    }
                } catch (error) {
                    console.error("Błąd połączenia:", error);
                    alert("❌ Wystąpił problem z połączeniem z serwerem.");
                }
            }

            // 🧩 ZDARZENIA

            // Walidacja hasła w trakcie pisania
            fields.password.addEventListener("input", () => {
                const isValid = isValidPassword(fields.password.value);
                errors.passwordInfo.classList.toggle("valid", isValid);
                errors.passwordInfo.classList.toggle("invalid", !isValid);
            });

            // Sprawdzanie powtórzenia hasła
            fields.againPassword.addEventListener("input", checkPasswordsMatch);

            // Sprawdzanie emaila
            fields.email.addEventListener("blur", checkEmail);

            // Wysyłka formularza
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                if (validateForm()) {
                    await registerUser();
                }
            });
        });
    </script>

</body>
</html>
